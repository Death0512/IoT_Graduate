<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Traffic Monitor</title>
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #18181b;
      --surface-hover: #27272a;
      --border: #27272a;
      --text: #fafafa;
      --text-muted: #71717a;
      --accent: #3b82f6;
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
    }

    /* ===== Main Layout ===== */
    .app {
      display: flex;
      height: 100vh;
    }

    /* ===== Video Grid ===== */
    .video-area {
      flex: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 0;
    }

    .video-grid {
      flex: 1;
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
    }

    .video-grid.single {
      grid-template-columns: 1fr;
    }

    .video-grid.dual {
      grid-template-columns: repeat(2, 1fr);
    }

    .video-grid.quad {
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
    }

    .video-card {
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 16/9;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .video-card:hover {
      transform: scale(1.005);
      box-shadow: 0 0 0 2px var(--accent);
    }

    .video-card.fullscreen {
      position: fixed;
      inset: 0;
      z-index: 100;
      border-radius: 0;
      aspect-ratio: auto;
    }

    .video-card video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    /* Video Overlay */
    .video-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 12px;
      opacity: 0;
      transition: opacity 0.2s;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.6) 0%, transparent 30%, transparent 70%, rgba(0, 0, 0, 0.6) 100%);
    }

    .video-card:hover .video-overlay {
      opacity: 1;
    }

    .video-card.fullscreen .video-overlay {
      opacity: 1;
    }

    .video-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .video-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }

    .status-dot.live {
      background: var(--success);
      animation: pulse 2s infinite;
    }

    .status-dot.connecting {
      background: var(--warning);
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.5;
      }
    }

    .video-actions {
      display: flex;
      gap: 6px;
    }

    .video-footer {
      display: flex;
      justify-content: flex-end;
    }

    /* ===== Buttons ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .btn-icon {
      padding: 8px;
    }

    .btn-primary {
      background: var(--accent);
    }

    .btn-primary:hover {
      background: #2563eb;
    }

    .btn-danger {
      background: var(--danger);
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    /* ===== Top Bar ===== */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px;
    }

    .topbar h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
    }

    /* ===== Sidebar (Violations) ===== */
    .sidebar {
      width: 340px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transition: margin-right 0.3s;
    }

    .sidebar.hidden {
      margin-right: -340px;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-header h2 {
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge-count {
      background: var(--danger);
      color: white;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .violations-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .violation-card {
      display: flex;
      gap: 12px;
      padding: 10px;
      background: var(--bg);
      border-radius: 10px;
      border: 1px solid var(--border);
      transition: border-color 0.15s;
    }

    .violation-card:hover {
      border-color: var(--accent);
    }

    .violation-thumb {
      width: 80px;
      height: 54px;
      border-radius: 6px;
      background: #000;
      object-fit: cover;
      cursor: pointer;
    }

    .violation-info {
      flex: 1;
      min-width: 0;
    }

    .violation-speed {
      font-size: 18px;
      font-weight: 700;
      color: var(--danger);
    }

    .violation-plate {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      margin-top: 4px;
      font-family: 'Courier New', monospace;
      letter-spacing: 1px;
    }

    .violation-meta {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .violation-tags {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 11px;
      padding: 2px 8px;
      background: var(--surface-hover);
      border-radius: 4px;
      color: var(--text-muted);
    }

    /* ===== Modal ===== */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      place-items: center;
      z-index: 200;
    }

    .modal.show {
      display: grid;
    }

    .modal-content {
      background: var(--surface);
      border-radius: 16px;
      padding: 24px;
      width: min(420px, 90vw);
    }

    .modal-content h3 {
      margin-bottom: 20px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 20px;
    }

    /* ===== Lightbox ===== */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      place-items: center;
      z-index: 300;
      cursor: zoom-out;
    }

    .lightbox.show {
      display: grid;
    }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
    }

    /* ===== Empty State ===== */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      text-align: center;
      padding: 40px;
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* ===== Responsive ===== */
    @media (max-width: 900px) {
      .sidebar {
        position: fixed;
        right: 0;
        top: 0;
        bottom: 0;
        z-index: 50;
      }

      .video-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <!-- Video Area -->
    <div class="video-area">
      <div class="topbar">
        <h1>🎥 Traffic Monitor</h1>
        <div class="topbar-actions">
          <button class="btn" id="addCameraBtn">+ Thêm Camera</button>
          <button class="btn btn-icon" id="toggleSidebar" title="Cảnh báo vi phạm">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
              <path d="M13.73 21a2 2 0 0 1-3.46 0" />
            </svg>
          </button>
        </div>
      </div>

      <div class="video-grid" id="videoGrid">
        <!-- Video cards will be added here dynamically -->
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z" />
            <line x1="12" y1="9" x2="12" y2="13" />
            <line x1="12" y1="17" x2="12.01" y2="17" />
          </svg>
          Vi phạm
          <span class="badge-count" id="violationCount">0</span>
        </h2>
        <button class="btn btn-danger btn-icon" id="clearViolations" title="Xóa tất cả">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18" />
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6" />
            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
          </svg>
        </button>
      </div>
      <div class="violations-list" id="violationsList">
        <div class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10" />
            <path d="M8 15s1.5 2 4 2 4-2 4-2" />
            <line x1="9" y1="9" x2="9.01" y2="9" />
            <line x1="15" y1="9" x2="15.01" y2="9" />
          </svg>
          <p>Chưa có vi phạm nào</p>
        </div>
      </div>
    </aside>
  </div>

  <!-- Add Camera Modal -->
  <div class="modal" id="addModal">
    <div class="modal-content">
      <h3>Thêm Camera</h3>
      <div class="form-group">
        <label>Tên Camera / Room</label>
        <input type="text" id="inputRoom" placeholder="VD: Camera cổng, Luồng 1..." autocomplete="off">
      </div>
      <div class="form-group">
        <label>Server IP (để trống = server hiện tại)</label>
        <input type="text" id="inputServer" placeholder="VD: 192.168.1.100">
      </div>
      <div class="modal-actions">
        <button class="btn" id="cancelAdd">Hủy</button>
        <button class="btn btn-primary" id="confirmAdd">Thêm</button>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <img id="lightboxImg" src="" alt="Preview">
  </div>

  <script>
    // ===== State =====
    const state = {
      sources: [],
      violations: [],
      sidebarVisible: true
    };

    // ===== DOM Elements =====
    const videoGrid = document.getElementById('videoGrid');
    const sidebar = document.getElementById('sidebar');
    const violationsList = document.getElementById('violationsList');
    const violationCount = document.getElementById('violationCount');
    const addModal = document.getElementById('addModal');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');

    // ===== Video Source Class =====
    class VideoSource {
      constructor(room, server) {
        this.id = Date.now();
        this.room = room || `Camera ${state.sources.length + 1}`;
        this.server = server || location.hostname;
        this.ws = null;
        this.pc = null;
        this.status = 'connecting';
        this._createCard();
        this._connect();
      }

      _createCard() {
        this.card = document.createElement('div');
        this.card.className = 'video-card';
        this.card.innerHTML = `
          <video autoplay playsinline muted></video>
          <div class="video-overlay">
            <div class="video-header">
              <div class="video-title">
                <span class="status-dot connecting"></span>
                <span>${this.room}</span>
              </div>
              <div class="video-actions">
                <button class="btn btn-icon" title="Kết nối lại" data-action="reconnect">↻</button>
                <button class="btn btn-icon btn-danger" title="Xóa" data-action="remove">✕</button>
              </div>
            </div>
            <div class="video-footer"></div>
          </div>
        `;

        this.video = this.card.querySelector('video');
        this.statusDot = this.card.querySelector('.status-dot');

        // Event listeners
        this.card.addEventListener('dblclick', () => this._toggleFullscreen());
        this.card.addEventListener('click', (e) => {
          const action = e.target.closest('[data-action]')?.dataset.action;
          if (action === 'reconnect') this.reconnect();
          if (action === 'remove') this.remove();
        });
      }

      _connect() {
        this.status = 'connecting';
        this._updateStatus();

        const wsUrl = `ws://${this.server}:8080/ws?room=${encodeURIComponent(this.room)}&role=sub`;
        this.ws = new WebSocket(wsUrl);

        this.ws.onopen = () => console.log(`[${this.room}] WS connected`);
        this.ws.onclose = () => {
          if (this.status !== 'removed') {
            this.status = 'disconnected';
            this._updateStatus();
            setTimeout(() => this.reconnect(), 2000);
          }
        };
        this.ws.onmessage = (e) => this._onMessage(JSON.parse(e.data));

        this.pc = new RTCPeerConnection({
          iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        });

        this.pc.ontrack = (e) => {
          this.video.srcObject = e.streams[0];
          this.status = 'live';
          this._updateStatus();
        };

        this.pc.onicecandidate = (e) => {
          if (e.candidate && this.ws.readyState === WebSocket.OPEN) {
            this.ws.send(JSON.stringify({ type: 'ice', candidate: e.candidate }));
          }
        };
      }

      async _onMessage(msg) {
        if (msg.type === 'offer') {
          await this.pc.setRemoteDescription({ type: 'offer', sdp: msg.sdp });
          const answer = await this.pc.createAnswer();
          await this.pc.setLocalDescription(answer);
          this.ws.send(JSON.stringify({ type: 'answer', sdp: answer.sdp }));
        } else if (msg.type === 'ice') {
          try { await this.pc.addIceCandidate(msg.candidate); } catch { }
        } else if (msg.type === 'overspeed') {
          addViolation({ ...msg, room: this.room });
        }
      }

      _updateStatus() {
        this.statusDot.className = 'status-dot ' + this.status;
      }

      _toggleFullscreen() {
        this.card.classList.toggle('fullscreen');
      }

      reconnect() {
        this._cleanup();
        this._connect();
      }

      _cleanup() {
        try { this.ws?.close(); } catch { }
        try { this.pc?.close(); } catch { }
      }

      remove() {
        this.status = 'removed';
        this._cleanup();
        this.card.remove();
        state.sources = state.sources.filter(s => s.id !== this.id);
        updateGridLayout();
      }
    }

    // ===== Functions =====
    function addSource(room, server) {
      const source = new VideoSource(room, server);
      state.sources.push(source);
      videoGrid.appendChild(source.card);
      updateGridLayout();
    }

    function updateGridLayout() {
      const count = state.sources.length;
      videoGrid.className = 'video-grid';
      if (count === 1) videoGrid.classList.add('single');
      else if (count === 2) videoGrid.classList.add('dual');
      else if (count <= 4) videoGrid.classList.add('quad');
    }

    function addViolation(data) {
      const violation = {
        id: Date.now(),
        speed: Math.round(data.speed_kmh),
        room: data.room,
        trackId: data.track_id,
        plate: data.license_plate || null,
        image: data.image_b64,
        time: new Date().toLocaleTimeString('vi-VN')
      };

      state.violations.unshift(violation);
      if (state.violations.length > 100) state.violations.pop();

      renderViolations();
    }

    function renderViolations() {
      violationCount.textContent = state.violations.length;

      if (state.violations.length === 0) {
        violationsList.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="12" cy="12" r="10"/>
              <path d="M8 15s1.5 2 4 2 4-2 4-2"/>
              <line x1="9" y1="9" x2="9.01" y2="9"/>
              <line x1="15" y1="9" x2="15.01" y2="9"/>
            </svg>
            <p>Chưa có vi phạm nào</p>
          </div>
        `;
        return;
      }

      violationsList.innerHTML = state.violations.map(v => `
        <div class="violation-card">
          <img class="violation-thumb" 
               src="${v.image ? `data:image/jpeg;base64,${v.image}` : ''}" 
               onclick="showLightbox('${v.image}')"
               alt="Ảnh vi phạm">
          <div class="violation-info">
            <div class="violation-speed">${v.speed} km/h</div>
            ${v.plate ? `<div class="violation-plate">${v.plate}</div>` : ''}
            <div class="violation-meta">${v.time}</div>
            <div class="violation-tags">
              <span class="tag">${v.room}</span>
            </div>
          </div>
        </div>
      `).join('');
    }

    function showLightbox(base64) {
      if (!base64) return;
      lightboxImg.src = `data:image/jpeg;base64,${base64}`;
      lightbox.classList.add('show');
    }

    // ===== Event Listeners =====
    document.getElementById('toggleSidebar').onclick = () => {
      state.sidebarVisible = !state.sidebarVisible;
      sidebar.classList.toggle('hidden', !state.sidebarVisible);
    };

    document.getElementById('addCameraBtn').onclick = () => addModal.classList.add('show');
    document.getElementById('cancelAdd').onclick = () => addModal.classList.remove('show');

    document.getElementById('confirmAdd').onclick = () => {
      const room = document.getElementById('inputRoom').value.trim();
      const server = document.getElementById('inputServer').value.trim();
      if (room) {
        addSource(room, server || location.hostname);
        addModal.classList.remove('show');
        document.getElementById('inputRoom').value = '';
        document.getElementById('inputServer').value = '';
      }
    };

    document.getElementById('clearViolations').onclick = () => {
      state.violations = [];
      renderViolations();
    };

    lightbox.onclick = () => lightbox.classList.remove('show');

    // ===== Init from URL =====
    (function init() {
      const params = new URLSearchParams(location.search);
      const rooms = (params.get('room') || '').split(',').filter(Boolean);
      const server = params.get('server');

      rooms.forEach(room => addSource(room.trim(), server));
      renderViolations();
    })();
  </script>
</body>

</html>
