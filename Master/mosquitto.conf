# Mosquitto MQTT Broker — Multi-Edge Coordination
# Lưu file này tại /etc/mosquitto/conf.d/multi_edge.conf
# hoặc chạy trực tiếp: mosquitto -c mosquitto.conf

# Listener TCP (cho Edge Nodes kết nối)
listener 1883
protocol mqtt

# Listener WebSocket (cho Web UI kết nối)
listener 9001
protocol websockets

# Xác thực (bật sau khi đã test xong)
allow_anonymous false
password_file /etc/mosquitto/passwd

# Tạm cho phép anonymous khi dev/test
# allow_anonymous true

# Giữ log để debug
log_dest file /var/log/mosquitto/mosquitto.log
log_type all

# Persistence (khôi phục message khi broker restart)
persistence true
persistence_location /var/lib/mosquitto/
