<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Giám sát giao thông</title>
  <style>
    :root {
      --bg: #0a0b0f;
      --panel: #11141a;
      --card: #151a22;
      --fg: #e6e9ef;
      --muted: #9aa4b2;
      --accent: #1c70ff;
      --ok: #31c48d;
      --warn: #f59e0b;
      --border: #1f2631;
      --resize-handle: #2b3340;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font: 13px/1.5 system-ui, -apple-system, sans-serif;
    }

    /* ===== COMPACT TOOLBAR ===== */
    .toolbar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 6px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      height: 40px;
      flex-shrink: 0;
    }

    .toolbar h1 {
      font-size: 14px;
      font-weight: 600;
      margin: 0;
    }

    .grow {
      flex: 1;
    }

    /* Grid Layout Selector */
    .grid-selector {
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .grid-selector label {
      font-size: 11px;
      color: var(--muted);
    }

    .grid-selector select {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--fg);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }

    .btn {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--fg);
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: .15s;
      font-size: 12px;
    }

    .btn:hover {
      filter: brightness(1.15);
    }

    .btn-primary {
      background: linear-gradient(180deg, #1c70ff, #1056d6);
      border-color: #134fbf;
    }

    /* ===== MAIN CONTAINER WITH RESIZABLE SIDEBAR ===== */
    .container {
      display: flex;
      height: calc(100vh - 40px);
      position: relative;
    }

    /* Video Area (grows to fill space) */
    .video-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    /* Grid Controls */
    .grid-controls {
      padding: 8px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .page-info {
      font-size: 11px;
      color: var(--muted);
    }

    /* Video Grid */
    .grid-container {
      flex: 1;
      padding: 12px;
      overflow: auto;
    }

    #grid {
      display: grid;
      gap: 12px;
      height: 100%;
    }

    /* Dynamic grid classes */
    .grid-2x2 {
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(2, 1fr);
    }

    .grid-4x4 {
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
    }

    .grid-6x6 {
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(6, 1fr);
    }

    .grid-8x8 {
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
    }

    .cell {
      min-height: 0;
      min-width: 0;
      position: relative;
    }

    .card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    /* Video overlay */
    .overlay {
      position: absolute;
      left: 6px;
      right: 6px;
      bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
      justify-content: space-between;
      pointer-events: none;
      z-index: 10;
    }

    .badge {
      pointer-events: auto;
      background: rgba(20, 24, 32, .85);
      backdrop-filter: blur(4px);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #666;
    }

    .dot.ok {
      background: var(--ok);
      box-shadow: 0 0 8px var(--ok);
    }

    .dot.warn {
      background: var(--warn);
    }

    .actions {
      pointer-events: auto;
      display: flex;
      gap: 4px;
    }

    .actions .btn {
      padding: 4px 8px;
      font-size: 11px;
    }

    /* ===== RESIZABLE SIDEBAR ===== */
    .sidebar {
      width: 320px;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: relative;
      transition: width 0.3s ease;
    }

    .sidebar.collapsed {
      width: 0 !important;
      border: none;
      overflow: hidden;
    }

    /* Resize handle */
    .resize-handle {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 8px;
      cursor: ew-resize;
      background: transparent;
      z-index: 100;
      transition: background 0.2s;
    }

    .resize-handle:hover,
    .resize-handle.dragging {
      background: var(--resize-handle);
    }

    .resize-handle::before {
      content: '';
      position: absolute;
      left: 3px;
      top: 50%;
      transform: translateY(-50%);
      width: 2px;
      height: 40px;
      background: var(--border);
      border-radius: 1px;
    }

    /* Sidebar header */
    .sidebar-header {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .sidebar-header h2 {
      font-size: 13px;
      margin: 0;
      flex: 1;
    }

    .toggle-sidebar {
      padding: 4px 8px;
      font-size: 11px;
    }

    /* Feed */
    .feed {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      overflow: auto;
      flex: 1;
    }

    .item {
      display: flex;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
    }

    .item img {
      width: 72px;
      height: 48px;
      background: #000;
      border-radius: 6px;
      object-fit: cover;
      cursor: pointer;
    }

    .i-body {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
      flex: 1;
    }

    .i-title {
      font-weight: 600;
      font-size: 13px;
    }

    .i-sub {
      font-size: 11px;
      color: var(--muted);
    }

    .i-row {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .pill {
      font-size: 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      border-radius: 999px;
      padding: 2px 6px;
    }

    /* Feed controls */
    .feed-controls {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
    }

    .muted {
      color: var(--muted);
      font-size: 11px;
    }

    /* Toggle button for collapsed sidebar */
    .sidebar-toggle-btn {
      position: fixed;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-right: none;
      border-radius: 8px 0 0 8px;
      padding: 12px 4px;
      cursor: pointer;
      z-index: 200;
      transition: all 0.3s;
      display: none;
    }

    .sidebar.collapsed~.sidebar-toggle-btn {
      display: block;
    }

    .sidebar-toggle-btn:hover {
      background: var(--card);
      padding-left: 6px;
    }

    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, .6);
      backdrop-filter: blur(3px);
      z-index: 1000;
    }

    .modal.show {
      display: grid;
    }

    .dialog {
      width: min(420px, 90vw);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
    }

    .dialog h3 {
      margin: 0 0 12px 0;
      font-size: 15px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    label {
      font-size: 12px;
      color: var(--muted);
    }

    input[type=text] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--fg);
      border-radius: 8px;
      padding: 8px 10px;
      outline: none;
      font-size: 13px;
    }

    input[type=text]:focus {
      border-color: var(--accent);
    }

    .dialog .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 8px;
      pointer-events: auto;
    }

    /* Lightbox */
    #lightbox {
      cursor: pointer;
    }

    #lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        position: absolute;
        right: 0;
        top: 0;
        bottom: 0;
        z-index: 500;
        box-shadow: -4px 0 12px rgba(0, 0, 0, 0.3);
      }

      .grid-2x2 {
        grid-template-columns: 1fr;
        grid-template-rows: repeat(4, 1fr);
      }
    }
  </style>
</head>

<body>
  <!-- Toolbar -->
  <div class="toolbar">
    <h1>🚦 Giám sát giao thông</h1>
    <div class="grow"></div>

    <!-- Grid Layout Selector -->
    <div class="grid-selector">
      <label>Layout:</label>
      <select id="gridLayout">
        <option value="2x2" selected>2×2 (4 cam)</option>
        <option value="4x4">4×4 (16 cam)</option>
        <option value="6x6">6×6 (36 cam)</option>
        <option value="8x8">8×8 (64 cam)</option>
      </select>
    </div>

    <button id="addBtn" class="btn btn-primary">+ Thêm</button>
  </div>

  <!-- Main Container -->
  <div class="container">
    <!-- Video Area -->
    <div class="video-area">
      <div class="grid-controls">
        <button id="prevPage" class="btn">‹ Trước</button>
        <span id="pageInfo" class="page-info">Trang 1/1</span>
        <button id="nextPage" class="btn">Sau ›</button>
      </div>

      <div class="grid-container">
        <div id="grid" class="grid-2x2"></div>
      </div>
    </div>

    <!-- Resizable Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="resize-handle" id="resizeHandle"></div>

      <div class="sidebar-header">
        <h2>⚠️ Cảnh báo vi phạm</h2>
        <div class="feed-controls">
          <button id="feedPrev" class="btn">‹</button>
          <span id="feedInfo" class="muted">1/1</span>
          <button id="feedNext" class="btn">›</button>
          <button id="clearFeed" class="btn">Xóa</button>
        </div>
        <button id="toggleSidebar" class="btn toggle-sidebar">−</button>
      </div>

      <div id="feed" class="feed"></div>
    </aside>

    <!-- Sidebar toggle button (when collapsed) -->
    <button class="sidebar-toggle-btn" id="expandSidebar">▶</button>
  </div>

  <!-- Add Source Modal -->
  <div id="modal" class="modal">
    <div class="dialog">
      <h3>Thêm nguồn camera</h3>
      <div class="field">
        <label>Tên phòng (room)</label>
        <input id="roomInput" type="text" placeholder="vd: Camera 1 / Gate A" />
      </div>
      <div class="field">
        <label>Server (mặc định: host hiện tại)</label>
        <input id="serverInput" type="text" placeholder="vd: 192.168.1.100" />
      </div>
      <div class="actions">
        <button id="cancelAdd" class="btn">Hủy</button>
        <button id="saveAdd" class="btn btn-primary">Thêm</button>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox" class="modal" onclick="Lightbox.hide()">
    <img id="lbImg" alt="preview" />
  </div>

  <script>
    const $ = (sel, el = document) => el.querySelector(sel);
    const grid = $('#grid');
    const sidebar = $('#sidebar');
    const resizeHandle = $('#resizeHandle');

    /* ===== Lightbox ===== */
    const Lightbox = {
      show(b64) {
        const lb = $('#lightbox');
        $('#lbImg').src = `data:image/jpeg;base64,${b64}`;
        lb.classList.add('show');
      },
      hide() {
        $('#lightbox').classList.remove('show');
      }
    };
    window.Lightbox = Lightbox;

    /* ===== Sidebar Resize ===== */
    let isResizing = false;
    let startX = 0;
    let startWidth = 0;

    resizeHandle.addEventListener('mousedown', (e) => {
      isResizing = true;
      startX = e.clientX;
      startWidth = sidebar.offsetWidth;
      resizeHandle.classList.add('dragging');
      document.body.style.cursor = 'ew-resize';
      document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', (e) => {
      if (!isResizing) return;
      const diff = startX - e.clientX;
      const newWidth = Math.max(200, Math.min(600, startWidth + diff));
      sidebar.style.width = newWidth + 'px';
    });

    document.addEventListener('mouseup', () => {
      if (isResizing) {
        isResizing = false;
        resizeHandle.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
      }
    });

    /* ===== Sidebar Toggle ===== */
    $('#toggleSidebar').onclick = () => {
      sidebar.classList.add('collapsed');
    };

    $('#expandSidebar').onclick = () => {
      sidebar.classList.remove('collapsed');
    };

    /* ===== Grid Layout Selector ===== */
    const gridLayoutSelect = $('#gridLayout');
    let currentLayout = '2x2';

    gridLayoutSelect.addEventListener('change', (e) => {
      currentLayout = e.target.value;
      grid.className = `grid-${currentLayout}`;
      updatePageSize();
      renderGrid();
    });

    function updatePageSize() {
      const [rows, cols] = currentLayout.split('x').map(Number);
      PAGE_SIZE = rows * cols;
    }

    /* ===== Pagination (grid sources) ===== */
    const pageInfo = $('#pageInfo');
    const prevBtn = $('#prevPage');
    const nextBtn = $('#nextPage');
    let PAGE_SIZE = 4; // 2x2
    let SOURCES = [];
    let currentPage = 1;

    function totalPages() {
      return Math.max(1, Math.ceil(SOURCES.length / PAGE_SIZE));
    }

    function renderGrid() {
      const tp = totalPages();
      if (currentPage > tp) currentPage = tp;
      if (currentPage < 1) currentPage = 1;

      grid.innerHTML = '';
      const start = (currentPage - 1) * PAGE_SIZE;
      const end = Math.min(start + PAGE_SIZE, SOURCES.length);

      for (let i = start; i < end; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.appendChild(SOURCES[i].card);
        grid.appendChild(cell);
      }

      // Fill empty cells
      for (let k = end; k < start + PAGE_SIZE; k++) {
        const empty = document.createElement('div');
        empty.className = 'cell';
        grid.appendChild(empty);
      }

      pageInfo.textContent = `Trang ${currentPage}/${tp}`;
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= tp;
    }

    prevBtn.onclick = () => {
      if (currentPage > 1) {
        currentPage--;
        renderGrid();
      }
    };

    nextBtn.onclick = () => {
      if (currentPage < totalPages()) {
        currentPage++;
        renderGrid();
      }
    };

    /* ===== WebRTC Sources ===== */
    let SRC_ID = 1;

    class Source {
      constructor(room, server) {
        this.id = SRC_ID++;
        this.room = room || 'Camera ' + this.id;
        this.server = server || location.hostname;
        this.ws = null;
        this.pc = null;
        this.video = null;
        this.card = null;
        this.dot = null;
        this._closing = false;
        this._buildCard();
        this._connect();
      }

      _buildCard() {
        const card = document.createElement('div');
        card.className = 'card';
        const v = document.createElement('video');
        v.autoplay = true;
        v.playsInline = true;
        v.controls = true;
        v.muted = true;
        card.appendChild(v);

        const ov = document.createElement('div');
        ov.className = 'overlay';
        card.appendChild(ov);

        const badge = document.createElement('div');
        badge.className = 'badge';
        ov.appendChild(badge);

        const dot = document.createElement('span');
        dot.className = 'dot';
        badge.appendChild(dot);

        const name = document.createElement('span');
        name.textContent = this.room;
        badge.appendChild(name);

        const actions = document.createElement('div');
        actions.className = 'actions';
        ov.appendChild(actions);

        const btnRe = document.createElement('button');
        btnRe.className = 'btn';
        btnRe.textContent = 'Kết nối lại';
        btnRe.onclick = () => this.reconnect();
        actions.appendChild(btnRe);

        const btnRm = document.createElement('button');
        btnRm.className = 'btn';
        btnRm.textContent = 'Xóa';
        btnRm.onclick = () => removeSource(this);
        actions.appendChild(btnRm);

        this.card = card;
        this.video = v;
        this.dot = dot;
      }

      _setStatus(kind) {
        this.dot.classList.remove('ok', 'warn');
        if (kind === 'ok') {
          this.dot.classList.add('ok');
        } else if (kind === 'warn') {
          this.dot.classList.add('warn');
        }
      }

      _connect() {
        const wsURL = `ws://${this.server}:8080/ws?room=${encodeURIComponent(this.room)}&role=sub`;
        console.log(`[${this.room}] Connecting to:`, wsURL);
        this.ws = new WebSocket(wsURL);

        this.ws.addEventListener('open', () => {
          console.log(`[${this.room}] WebSocket connected`);
          this._setStatus('warn');
        });

        this.ws.addEventListener('close', (ev) => {
          console.log(`[${this.room}] WebSocket closed:`, ev.code);
          if (!this._closing) {
            this._setStatus();
            setTimeout(() => this.reconnect(), 1500);
          }
        });

        this.ws.addEventListener('error', (ev) => {
          console.error(`[${this.room}] WebSocket error:`, ev);
          this._setStatus();
        });

        this.ws.addEventListener('message', (ev) => this._onWS(ev));

        this.pc = new RTCPeerConnection({
          iceServers: [{ urls: 'stun:stun.l.google.com:19302' }]
        });

        this.pc.ontrack = (ev) => {
          console.log(`[${this.room}] Track received`);
          this.video.srcObject = ev.streams[0];
          this._setStatus('ok');
        };

        this.pc.onicecandidate = (ev) => {
          if (ev.candidate) {
            this.ws?.send(JSON.stringify({ type: 'ice', candidate: ev.candidate }));
          }
        };

        this.pc.oniceconnectionstatechange = () => {
          console.log(`[${this.room}] ICE state:`, this.pc.iceConnectionState);
        };
      }

      async _onWS(ev) {
        let msg;
        try {
          msg = JSON.parse(ev.data);
        } catch {
          return;
        }

        if (msg.type === 'offer') {
          try {
            await this.pc.setRemoteDescription({ type: 'offer', sdp: msg.sdp });
            const ans = await this.pc.createAnswer();
            await this.pc.setLocalDescription(ans);
            this.ws?.send(JSON.stringify({ type: 'answer', sdp: ans.sdp }));
          } catch (e) {
            console.error(`[${this.room}] SDP error:`, e);
          }
          return;
        }

        if (msg.type === 'ice') {
          try {
            await this.pc.addIceCandidate(msg.candidate);
          } catch (e) {
            console.warn(`[${this.room}] ICE error:`, e);
          }
          return;
        }

        if (msg.type === 'overspeed') {
          addViolation({ ...msg, room: this.room });
          return;
        }
      }

      reconnect() {
        this.destroy(true);
        this._connect();
      }

      destroy(keepCard = false) {
        this._closing = true;
        try {
          this.ws?.close();
        } catch { }
        try {
          this.pc?.close();
        } catch { }
        if (!keepCard) {
          try {
            this.card.remove();
          } catch { }
        }
        this._closing = false;
      }
    }

    function addSource(room, server) {
      const src = new Source(room, server);
      SOURCES.push(src);
      renderGrid();
    }

    function removeSource(src) {
      const idx = SOURCES.indexOf(src);
      if (idx !== -1) SOURCES.splice(idx, 1);
      src.destroy(false);
      renderGrid();
    }

    /* ===== Violation Feed ===== */
    const feed = $('#feed');
    const feedPrev = $('#feedPrev');
    const feedNext = $('#feedNext');
    const feedInfo = $('#feedInfo');
    const FEED_PAGE_SIZE = 10;
    const VIOLATIONS = [];
    let feedPage = 1;

    function feedTotalPages() {
      return Math.max(1, Math.ceil(VIOLATIONS.length / FEED_PAGE_SIZE));
    }

    function renderFeed() {
      const tp = feedTotalPages();
      if (feedPage > tp) feedPage = tp;
      if (feedPage < 1) feedPage = 1;

      feed.innerHTML = '';
      const start = (feedPage - 1) * FEED_PAGE_SIZE;
      const end = Math.min(start + FEED_PAGE_SIZE, VIOLATIONS.length);

      for (let i = start; i < end; i++) {
        const v = VIOLATIONS[i];
        const el = document.createElement('div');
        el.className = 'item';

        const img = document.createElement('img');
        img.alt = 'snapshot';
        img.src = v.image_b64 ? `data:image/jpeg;base64,${v.image_b64}` : '';
        img.onclick = () => v.image_b64 && Lightbox.show(v.image_b64);
        el.appendChild(img);

        const body = document.createElement('div');
        body.className = 'i-body';
        el.appendChild(body);

        const title = document.createElement('div');
        title.className = 'i-title';
        title.textContent = `${Math.round(v.speed_kmh)} km/h`;
        body.appendChild(title);

        const sub = document.createElement('div');
        sub.className = 'i-sub';
        sub.textContent = `${v.ts || new Date().toLocaleString()} • #${v.track_id}`;
        body.appendChild(sub);

        const row = document.createElement('div');
        row.className = 'i-row';
        body.appendChild(row);

        const p1 = document.createElement('span');
        p1.className = 'pill';
        p1.textContent = v.room || 'room';
        row.appendChild(p1);

        if (v.license_plate) {
          const p2 = document.createElement('span');
          p2.className = 'pill';
          p2.textContent = v.license_plate;
          row.appendChild(p2);
        }

        feed.appendChild(el);
      }

      feedInfo.textContent = `${feedPage}/${tp}`;
      feedPrev.disabled = feedPage <= 1;
      feedNext.disabled = feedPage >= tp;
    }

    function addViolation(v) {
      const ts = v.ts || new Date().toLocaleString();
      VIOLATIONS.unshift({ ...v, ts });
      feedPage = 1;
      renderFeed();

      const MAX_KEEP = 500;
      if (VIOLATIONS.length > MAX_KEEP) {
        VIOLATIONS.length = MAX_KEEP;
      }
    }

    $('#clearFeed').onclick = () => {
      VIOLATIONS.length = 0;
      feedPage = 1;
      renderFeed();
    };

    feedPrev.onclick = () => {
      if (feedPage > 1) {
        feedPage--;
        renderFeed();
      }
    };

    feedNext.onclick = () => {
      if (feedPage < feedTotalPages()) {
        feedPage++;
        renderFeed();
      }
    };

    /* ===== Modal ===== */
    const modal = $('#modal');
    const addBtn = $('#addBtn');
    const roomInput = $('#roomInput');
    const serverInput = $('#serverInput');

    $('#cancelAdd').onclick = () => modal.classList.remove('show');

    $('#saveAdd').onclick = () => {
      const room = roomInput.value.trim();
      if (!room) {
        roomInput.focus();
        return;
      }
      const server = serverInput.value.trim() || location.hostname;
      addSource(room, server);
      modal.classList.remove('show');
      roomInput.value = '';
      serverInput.value = '';
    };

    addBtn.onclick = () => modal.classList.add('show');

    /* ===== Auto-add from URL ===== */
    (function () {
      const sp = new URLSearchParams(location.search);
      const rooms = (sp.get('room') || '').split(',').map(s => s.trim()).filter(Boolean);
      const server = sp.get('server') || undefined;
      rooms.forEach(r => addSource(r, server));
      renderFeed();
    })();
  </script>
</body>

</html>
